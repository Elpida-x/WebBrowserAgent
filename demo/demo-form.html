<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>演示表单 · 活动报名</title>
  <style>
    body { margin: 0; background: #f3f4f6; color: #111827;
           font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .card { max-width: 560px; margin: 48px auto; background: #fff; border: 1px solid #e5e7eb;
            border-radius: 14px; padding: 28px 32px; box-shadow: 0 6px 24px rgba(0,0,0,.06); }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: #6b7280; margin: 0 0 20px; font-size: 14px; }
    label { display: block; margin: 14px 0 6px; font-weight: 500; font-size: 14px; }
    input, select, textarea {
      width: 100%; box-sizing: border-box; padding: 10px 12px; font: inherit;
      border: 1px solid #d1d5db; border-radius: 8px; background: #fff; }
    input:focus, select:focus, textarea:focus { outline: 2px solid #3b82f6; border-color: #3b82f6; }
    textarea { min-height: 84px; resize: vertical; }
    button { margin-top: 22px; width: 100%; padding: 12px; font: inherit; font-weight: 600;
             color: #fff; background: #2563eb; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .ok { margin-top: 18px; padding: 14px 16px; border-radius: 10px;
          background: #ecfdf5; border: 1px solid #34d399; color: #065f46; font-weight: 600; }
    .row { display: flex; gap: 14px; }
    .row > div { flex: 1; }
  </style>
</head>
<body>
  <div class="card">
    <h1>活动报名</h1>
    <p class="sub">演示用表单（仅用于本地演示，不会真正提交到任何服务器）。</p>
    <form id="f" autocomplete="off">
      <div class="row">
        <div>
          <label for="username">用户名</label>
          <input id="username" name="username" type="text" placeholder="请输入用户名" />
        </div>
        <div>
          <label for="email">邮箱</label>
          <input id="email" name="email" type="email" placeholder="name@example.com" />
        </div>
      </div>
      <label for="password">密码</label>
      <input id="password" name="password" type="password" placeholder="（演示：该字段值不会发送给模型）" />
      <label for="topic">主题</label>
      <select id="topic" name="topic">
        <option value="">请选择…</option>
        <option>技术咨询</option>
        <option>商务合作</option>
        <option>其他</option>
      </select>
      <label for="message">留言</label>
      <textarea id="message" name="message" placeholder="请输入留言"></textarea>
      <button type="submit" id="submit">提交报名</button>
    </form>
    <div id="ok" class="ok" hidden>✅ 提交成功，感谢报名！</div>
  </div>

  <script>
    document.getElementById("f").addEventListener("submit", (e) => {
      e.preventDefault();
      const ok = document.getElementById("ok");
      ok.hidden = false;
      ok.scrollIntoView({ behavior: "smooth", block: "center" });
    });
  </script>
</body>
</html>
